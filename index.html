<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pessoal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Sidebar para dashboards -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Dashboards</h3>
                <button id="toggle-dashboard-builder" class="toggle-builder-btn" type="button">Configurar</button>
            </div>
            <ul id="lista-dashboards"></ul>

            <div class="dashboard-builder">
                <h4>Novo dashboard</h4>
                <input type="text" id="novo-dashboard-nome" placeholder="Nome do dashboard">
                <div class="dashboard-cor-row">
                    <input type="color" id="novo-dashboard-cor" value="#58a6ff">
                    <span id="novo-dashboard-cor-preview" class="color-preview"></span>
                </div>
                <button id="criar-dashboard-btn" type="button">Criar dashboard</button>

                <div class="cores-existentes-wrapper">
                    <p>Paleta de cores</p>
                    <div id="cores-existentes" class="cores-existentes"></div>
                </div>

                <h4>Editar dashboard atual</h4>
                <input type="text" id="renomear-dashboard-nome" placeholder="Renomear dashboard">
                <div class="dashboard-cor-row">
                    <input type="color" id="dashboard-cor-atual">
                    <span id="dashboard-cor-preview" class="color-preview"></span>
                </div>
                <button id="atualizar-dashboard-btn" type="button">Salvar alterações</button>

                <p id="dashboard-mensagem" class="mensagem"></p>
            </div>
        </aside>

        <!-- Conteúdo principal -->
        <main class="main-content">
            <header>
                <h1 id="titulo-dashboard">Pessoal</h1>
                <p>Controle de Gastos - Lusk-WDev</p>
            </header>

            <!-- Cards de Resumo -->
            <section class="resumo">
                <div class="card">
                    <h3>Saldo Atual</h3>
                    <p id="saldo-total">R$ 0,00</p>
                </div>
                <div class="card entrada">
                    <h3>Entradas</h3>
                    <p id="resumo-entradas">R$ 0,00</p>
                </div>
                <div class="card saida">
                    <h3>Saídas</h3>
                    <p id="resumo-saidas">R$ 0,00</p>
                </div>
            </section>

            <!-- Formulário de Cadastro -->
            <section class="cadastro">
                <h3>Nova Transação</h3>
                <form id="form-transacao">
                    <input type="text" id="descricao" placeholder="Descrição (ex: Teclado AULA F75)" required>
                    <input type="number" id="valor" placeholder="Valor (ex: 350)" required>
                    <select id="tipo">
                        <option value="entrada">Entrada</option>
                        <option value="saida">Saída</option>
                    </select>
                    <button type="submit">Adicionar</button>
                </form>
            </section>

            <!-- Lista de Transações -->
            <section class="historico">
                <h3>Histórico</h3>
                <ul id="lista-transacoes" class="transacoes">
                    <!-- O JavaScript vai injetar os itens aqui -->
                </ul>
            </section>
        </main>
    </div>

    <!-- Importante: Chamando os scripts no final do body -->
    <script type="module" src="script.js"></script>
</body>
</html
